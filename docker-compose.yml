services:
    extractor:
        image: notebookum-extractor:v1.0.0
        restart: unless-stopped
        deploy:
            replicas: 1
        networks:
            notebookum-network:
                aliases:
                    - extractor.universidad.localhost
        environment:
            - HOST=0.0.0.0
            - PORT=5000
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=${REDIS_PASSWORD:-}
            # Consul Service Discovery
            - CONSUL_HOST=consul
            - CONSUL_PORT=8500

networks:
    notebookum-network:
        external: true

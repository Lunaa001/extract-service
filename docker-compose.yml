services:
  extractor:
    build: .
    image: notebookum-extractor:v1.0.0
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      notebookum-network:
        aliases:
          - extractor.universidad.localhost
    environment:
      - CONSUL_URL=http://consul:8500

networks:
  notebookum-network:
    external: true
